<div class="blog-container">
  <div class="blog-grid">
    @for(post of blogs; track post.id){
      <div class="blog-post">
        <a [routerLink]="['/post', post.route]">
          <h1 class="post-title">{{ post.title }}</h1>
          <p class="post-summary">{{ post.summary }}</p>
        </a>
      </div>
    } @empty { <p>There are no items.</p> }
  </div>

  @if (loading) {
    <div class="loading">Loading...</div>
  }

  <!-- ✅ Anchor AFTER loader, always in DOM, never in @if -->
  <div #anchor class="scroll-anchor"></div>

  @if (!hasMore) {
    <p class="end-message">You've reached the end.</p>
  }
</div>
